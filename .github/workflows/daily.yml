# ─────────────────────────────────────────────────────────────
# CWS Prospects — Daily Stats Auto-Update
# Runs every morning at 8am CT (1pm UTC) and on manual trigger
# ─────────────────────────────────────────────────────────────

name: Update Prospect Stats

on:
  schedule:
    # 1pm UTC = 8am CT (CDT). Adjust to 2pm UTC (8am CST) in winter if needed.
    - cron: '0 13 * * *'

  # Lets you trigger manually from the Actions tab anytime
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated index.html

    steps:
      # 1. Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install requests (only dependency)
      - name: Install dependencies
        run: pip install requests

      # 4. Run the stat updater
      - name: Run update_stats.py
        run: python update_stats.py

      # 5. Commit and push only if index.html actually changed
      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet index.html; then
            echo "No stat changes today — nothing to commit."
          else
            git add index.html
            git commit -m "Auto-update: MiLB stats $(date +'%Y-%m-%d')"
            git push
            echo "Stats updated and pushed."
          fi
